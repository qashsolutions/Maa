<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=DM+Sans:wght@400;500;600;700&amp;display=swap');
    </style>
    <clipPath id="phone"><rect width="375" height="812" rx="40"/></clipPath>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0D060"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>

  <!-- Phone frame -->
  <rect width="375" height="812" rx="40" fill="#0D0A0E" clip-path="url(#phone)"/>
  <rect width="375" height="812" rx="40" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="3"/>

  <!-- Status bar -->
  <text x="36" y="38" fill="#fff" font-family="DM Sans, sans-serif" font-size="13" font-weight="600">9:41</text>
  <circle cx="310" cy="34" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="320" cy="34" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="330" cy="34" r="3" fill="rgba(255,255,255,0.5)"/>
  <rect x="340" y="28" width="12" height="12" rx="2" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <rect x="342" y="32" width="8" height="6" rx="1" fill="rgba(255,255,255,0.5)"/>

  <!-- Title -->
  <text x="24" y="105" fill="#FFFFFF" font-family="Playfair Display, serif" font-size="23" font-weight="700">Choose your language</text>
  <text x="24" y="130" fill="rgba(255,255,255,0.65)" font-family="DM Sans, sans-serif" font-size="15">Maa will speak in your language</text>

  <!-- Geo pulse animation area -->
  <circle cx="188" cy="195" r="20" fill="none" stroke="#DAA520" stroke-width="2" opacity="0.3"/>
  <circle cx="188" cy="195" r="35" fill="none" stroke="#DAA520" stroke-width="1.5" opacity="0.15"/>
  <circle cx="188" cy="195" r="50" fill="none" stroke="#DAA520" stroke-width="1" opacity="0.08"/>
  <!-- Target icon -->
  <circle cx="188" cy="195" r="10" fill="none" stroke="#DAA520" stroke-width="2"/>
  <circle cx="188" cy="195" r="3" fill="#DAA520"/>
  <line x1="188" y1="180" x2="188" y2="186" stroke="#DAA520" stroke-width="2"/>
  <line x1="188" y1="204" x2="188" y2="210" stroke="#DAA520" stroke-width="2"/>
  <line x1="173" y1="195" x2="179" y2="195" stroke="#DAA520" stroke-width="2"/>
  <line x1="197" y1="195" x2="203" y2="195" stroke="#DAA520" stroke-width="2"/>
  <text x="188" y="236" fill="rgba(255,255,255,0.4)" font-family="DM Sans, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Detecting your location...</text>

  <!-- Language grid: 2 columns, row 1 -->
  <!-- English -->
  <rect x="24" y="260" width="156" height="90" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="102" y="290" fill="#DAA520" font-family="DM Sans, sans-serif" font-size="32" text-anchor="middle">Aa</text>
  <text x="102" y="313" fill="#FFFFFF" font-family="DM Sans, sans-serif" font-size="16" font-weight="600" text-anchor="middle">English</text>
  <text x="102" y="330" fill="rgba(255,255,255,0.65)" font-family="DM Sans, sans-serif" font-size="12" font-weight="500" text-anchor="middle">English</text>

  <!-- Hindi (selected) -->
  <rect x="195" y="260" width="156" height="90" rx="16" fill="rgba(184,134,11,0.08)" stroke="#DAA520" stroke-width="1"/>
  <text x="273" y="290" fill="#DAA520" font-size="32" text-anchor="middle">&#x0905;</text>
  <text x="273" y="313" fill="#FFFFFF" font-family="DM Sans, sans-serif" font-size="16" font-weight="600" text-anchor="middle">&#x0939;&#x093F;&#x0928;&#x094D;&#x0926;&#x0940;</text>
  <text x="273" y="330" fill="rgba(255,255,255,0.65)" font-family="DM Sans, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Hindi</text>

  <!-- Row 2 -->
  <!-- Tamil -->
  <rect x="24" y="362" width="156" height="90" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="102" y="392" fill="#DAA520" font-size="32" text-anchor="middle">&#x0BA4;</text>
  <text x="102" y="415" fill="#FFFFFF" font-family="DM Sans, sans-serif" font-size="16" font-weight="600" text-anchor="middle">&#x0BA4;&#x0BAE;&#x0BBF;&#x0BB4;&#x0BCD;</text>
  <text x="102" y="432" fill="rgba(255,255,255,0.65)" font-family="DM Sans, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Tamil</text>

  <!-- Telugu -->
  <rect x="195" y="362" width="156" height="90" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="273" y="392" fill="#DAA520" font-size="32" text-anchor="middle">&#x0C24;&#x0C46;</text>
  <text x="273" y="415" fill="#FFFFFF" font-family="DM Sans, sans-serif" font-size="16" font-weight="600" text-anchor="middle">&#x0C24;&#x0C46;&#x0C32;&#x0C41;&#x0C17;&#x0C41;</text>
  <text x="273" y="432" fill="rgba(255,255,255,0.65)" font-family="DM Sans, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Telugu</text>

  <!-- Row 3 -->
  <!-- Kannada -->
  <rect x="24" y="464" width="156" height="90" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="102" y="494" fill="#DAA520" font-size="32" text-anchor="middle">&#x0C95;</text>
  <text x="102" y="517" fill="#FFFFFF" font-family="DM Sans, sans-serif" font-size="16" font-weight="600" text-anchor="middle">&#x0C95;&#x0CA8;&#x0CCD;&#x0CA8;&#x0CA1;</text>
  <text x="102" y="534" fill="rgba(255,255,255,0.65)" font-family="DM Sans, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Kannada</text>

  <!-- Bengali -->
  <rect x="195" y="464" width="156" height="90" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="273" y="494" fill="#DAA520" font-size="32" text-anchor="middle">&#x09AC;</text>
  <text x="273" y="517" fill="#FFFFFF" font-family="DM Sans, sans-serif" font-size="16" font-weight="600" text-anchor="middle">&#x09AC;&#x09BE;&#x0982;&#x09B2;&#x09BE;</text>
  <text x="273" y="534" fill="rgba(255,255,255,0.65)" font-family="DM Sans, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Bengali</text>

  <!-- Row 4 -->
  <!-- Marathi -->
  <rect x="24" y="566" width="156" height="90" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="102" y="596" fill="#DAA520" font-size="32" text-anchor="middle">&#x092E;</text>
  <text x="102" y="619" fill="#FFFFFF" font-family="DM Sans, sans-serif" font-size="16" font-weight="600" text-anchor="middle">&#x092E;&#x0930;&#x093E;&#x0920;&#x0940;</text>
  <text x="102" y="636" fill="rgba(255,255,255,0.65)" font-family="DM Sans, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Marathi</text>

  <!-- Gujarati -->
  <rect x="195" y="566" width="156" height="90" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="273" y="596" fill="#DAA520" font-size="32" text-anchor="middle">&#x0A97;</text>
  <text x="273" y="619" fill="#FFFFFF" font-family="DM Sans, sans-serif" font-size="16" font-weight="600" text-anchor="middle">&#x0A97;&#x0AC1;&#x0A9C;&#x0AB0;&#x0ABE;&#x0AA4;&#x0AC0;</text>
  <text x="273" y="636" fill="rgba(255,255,255,0.65)" font-family="DM Sans, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Gujarati</text>

  <!-- Row 5 -->
  <!-- Malayalam -->
  <rect x="24" y="668" width="156" height="90" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="102" y="698" fill="#DAA520" font-size="32" text-anchor="middle">&#x0D2E;</text>
  <text x="102" y="721" fill="#FFFFFF" font-family="DM Sans, sans-serif" font-size="16" font-weight="600" text-anchor="middle">&#x0D2E;&#x0D32;&#x0D2F;&#x0D3E;&#x0D33;&#x0D02;</text>
  <text x="102" y="738" fill="rgba(255,255,255,0.65)" font-family="DM Sans, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Malayalam</text>

  <!-- Punjabi -->
  <rect x="195" y="668" width="156" height="90" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="273" y="698" fill="#DAA520" font-size="32" text-anchor="middle">&#x0A2A;</text>
  <text x="273" y="721" fill="#FFFFFF" font-family="DM Sans, sans-serif" font-size="16" font-weight="600" text-anchor="middle">&#x0A2A;&#x0A70;&#x0A1C;&#x0A3E;&#x0A2C;&#x0A40;</text>
  <text x="273" y="736" fill="rgba(255,255,255,0.65)" font-family="DM Sans, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Punjabi</text>

  <!-- Home indicator -->
  <rect x="121" y="793" width="134" height="5" rx="3" fill="rgba(255,255,255,0.2)"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <defs>
    <clipPath id="phone"><rect width="375" height="812" rx="40"/></clipPath>
  </defs>

  <!-- Phone frame -->
  <rect width="375" height="812" rx="40" fill="#0D0A0E" clip-path="url(#phone)"/>
  <rect width="375" height="812" rx="40" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="3"/>

  <!-- Status bar -->
  <text x="36" y="38" fill="#fff" font-family="DM Sans, sans-serif" font-size="13" font-weight="600">9:41</text>
  <circle cx="310" cy="34" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="320" cy="34" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="330" cy="34" r="3" fill="rgba(255,255,255,0.5)"/>
  <rect x="340" y="28" width="12" height="12" rx="2" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <rect x="342" y="32" width="8" height="6" rx="1" fill="rgba(255,255,255,0.5)"/>

  <!-- PHONE ENTRY SECTION -->
  <text x="24" y="115" fill="#FFFFFF" font-family="Playfair Display, serif" font-size="23" font-weight="700">Enter your phone number</text>
  <text x="24" y="142" fill="rgba(255,255,255,0.65)" font-family="DM Sans, sans-serif" font-size="15">We'll send a verification code</text>

  <!-- Country code box -->
  <rect x="24" y="170" width="70" height="52" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="59" y="202" fill="#FFFFFF" font-family="DM Sans, sans-serif" font-size="16" font-weight="600" text-anchor="middle">+91</text>

  <!-- Phone input -->
  <rect x="106" y="170" width="245" height="52" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="122" y="202" fill="#FFFFFF" font-family="DM Sans, sans-serif" font-size="18" font-weight="600">98765 43210</text>

  <!-- Send OTP button -->
  <rect x="24" y="242" width="327" height="52" rx="14" fill="#DAA520"/>
  <text x="188" y="274" fill="#0D0A0E" font-family="DM Sans, sans-serif" font-size="16" font-weight="600" text-anchor="middle">Send OTP</text>

  <!-- Divider -->
  <line x1="60" y1="330" x2="315" y2="330" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- OTP VERIFICATION SECTION -->
  <text x="24" y="385" fill="#FFFFFF" font-family="Playfair Display, serif" font-size="23" font-weight="700">Verify your number</text>
  <text x="24" y="412" fill="rgba(255,255,255,0.65)" font-family="DM Sans, sans-serif" font-size="15">Code sent to +91 9876543210</text>
  <text x="276" y="412" fill="#DAA520" font-family="DM Sans, sans-serif" font-size="15" font-weight="500">Edit</text>

  <!-- 4 OTP boxes (72x80, borderRadius 20) -->
  <!-- Box 1: filled -->
  <rect x="33" y="440" width="72" height="80" rx="20" fill="rgba(255,255,255,0.04)" stroke="#DAA520" stroke-width="2"/>
  <text x="69" y="492" fill="#FFFFFF" font-family="DM Sans, sans-serif" font-size="28" font-weight="700" text-anchor="middle">7</text>

  <!-- Box 2: filled -->
  <rect x="115" y="440" width="72" height="80" rx="20" fill="rgba(255,255,255,0.04)" stroke="#DAA520" stroke-width="2"/>
  <text x="151" y="492" fill="#FFFFFF" font-family="DM Sans, sans-serif" font-size="28" font-weight="700" text-anchor="middle">2</text>

  <!-- Box 3: filled -->
  <rect x="197" y="440" width="72" height="80" rx="20" fill="rgba(255,255,255,0.04)" stroke="#DAA520" stroke-width="2"/>
  <text x="233" y="492" fill="#FFFFFF" font-family="DM Sans, sans-serif" font-size="28" font-weight="700" text-anchor="middle">4</text>

  <!-- Box 4: empty (focused) -->
  <rect x="279" y="440" width="72" height="80" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <!-- Cursor blink -->
  <line x1="315" y1="465" x2="315" y2="500" stroke="#DAA520" stroke-width="2" opacity="0.6"/>

  <!-- Countdown -->
  <text x="188" y="558" fill="rgba(255,255,255,0.4)" font-family="DM Sans, sans-serif" font-size="15" text-anchor="middle">Resend in 24s</text>

  <!-- Verify button (disabled until 4th digit) -->
  <rect x="24" y="590" width="327" height="52" rx="14" fill="#DAA520" opacity="0.4"/>
  <text x="188" y="622" fill="#0D0A0E" font-family="DM Sans, sans-serif" font-size="16" font-weight="600" text-anchor="middle" opacity="0.6">Verify</text>

  <!-- Home indicator -->
  <rect x="121" y="793" width="134" height="5" rx="3" fill="rgba(255,255,255,0.2)"/>
</svg>
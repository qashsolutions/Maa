<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <defs>
    <clipPath id="phone"><rect width="375" height="812" rx="40"/></clipPath>
  </defs>

  <!-- Phone frame -->
  <rect width="375" height="812" rx="40" fill="#0D0A0E" clip-path="url(#phone)"/>
  <rect width="375" height="812" rx="40" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="3"/>

  <!-- Status bar -->
  <text x="36" y="38" fill="#fff" font-family="DM Sans, sans-serif" font-size="13" font-weight="600">9:41</text>
  <circle cx="310" cy="34" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="320" cy="34" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="330" cy="34" r="3" fill="rgba(255,255,255,0.5)"/>
  <rect x="340" y="28" width="12" height="12" rx="2" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <rect x="342" y="32" width="8" height="6" rx="1" fill="rgba(255,255,255,0.5)"/>

  <!-- Header -->
  <path d="M30 72 L24 78 L30 84" fill="none" stroke="#DAA520" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="36" y="82" fill="#DAA520" font-family="DM Sans, sans-serif" font-size="15" font-weight="500">Back</text>
  <text x="188" y="82" fill="#FFFFFF" font-family="Playfair Display, serif" font-size="23" font-weight="700" text-anchor="middle">Subscription</text>

  <!-- ===== PLAN CARD ===== -->
  <rect x="24" y="108" width="327" height="200" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(184,134,11,0.2)" stroke-width="1.5"/>

  <!-- Star icon -->
  <g transform="translate(172, 130)">
    <polygon points="16,0 20,12 32,12 22,20 26,32 16,24 6,32 10,20 0,12 12,12" fill="#DAA520" transform="scale(0.9)"/>
  </g>

  <!-- Plan name -->
  <text x="188" y="192" fill="#DAA520" font-family="Playfair Display, serif" font-size="23" font-weight="700" text-anchor="middle">Free Trial</text>

  <!-- Status text -->
  <text x="188" y="218" fill="rgba(255,255,255,0.65)" font-family="DM Sans, sans-serif" font-size="15" text-anchor="middle">Trial ends in 180 days</text>

  <!-- Progress bar track -->
  <rect x="48" y="240" width="279" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
  <!-- Progress bar fill (100%) -->
  <rect x="48" y="240" width="279" height="6" rx="3" fill="#DAA520"/>

  <!-- Days count -->
  <text x="188" y="268" fill="rgba(255,255,255,0.4)" font-family="DM Sans, sans-serif" font-size="12" font-weight="500" text-anchor="middle">180 / 180</text>

  <!-- ===== PRICE CARD ===== -->
  <rect x="24" y="330" width="327" height="90" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="44" y="360" fill="rgba(255,255,255,0.4)" font-family="DM Sans, sans-serif" font-size="11" font-weight="600" letter-spacing="1.5">CURRENT PLAN</text>
  <text x="44" y="400" fill="rgba(255,255,255,0.65)" font-family="Playfair Display, serif" font-size="36" font-weight="700">...</text>
  <text x="86" y="400" fill="rgba(255,255,255,0.65)" font-family="DM Sans, sans-serif" font-size="15">/month</text>

  <!-- ===== FEATURES ===== -->
  <text x="24" y="454" fill="rgba(255,255,255,0.4)" font-family="DM Sans, sans-serif" font-size="11" font-weight="600" letter-spacing="1.5">WHAT YOU GET</text>
  <rect x="24" y="464" width="327" height="200" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Feature 1 -->
  <g transform="translate(40, 480)">
    <polyline points="2,10 7,16 16,4" fill="none" stroke="#DAA520" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="72" y="497" fill="#FFFFFF" font-family="DM Sans, sans-serif" font-size="15">Unlimited voice conversations</text>
  <line x1="40" y1="512" x2="335" y2="512" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Feature 2 -->
  <g transform="translate(40, 526)">
    <polyline points="2,10 7,16 16,4" fill="none" stroke="#DAA520" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="72" y="543" fill="#FFFFFF" font-family="DM Sans, sans-serif" font-size="15">Weekly health insights</text>
  <line x1="40" y1="558" x2="335" y2="558" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Feature 3 -->
  <g transform="translate(40, 572)">
    <polyline points="2,10 7,16 16,4" fill="none" stroke="#DAA520" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="72" y="589" fill="#FFFFFF" font-family="DM Sans, sans-serif" font-size="15">Predictive cycle analysis</text>
  <line x1="40" y1="604" x2="335" y2="604" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Feature 4 -->
  <g transform="translate(40, 618)">
    <polyline points="2,10 7,16 16,4" fill="none" stroke="#DAA520" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="72" y="635" fill="#FFFFFF" font-family="DM Sans, sans-serif" font-size="15">All 10 Indian languages</text>

  <!-- ===== MANAGE PLAN BUTTON ===== -->
  <rect x="24" y="696" width="327" height="52" rx="14" fill="#DAA520"/>
  <text x="188" y="728" fill="#0D0A0E" font-family="DM Sans, sans-serif" font-size="16" font-weight="600" text-anchor="middle">Manage Plan</text>

  <!-- Home indicator -->
  <rect x="121" y="793" width="134" height="5" rx="3" fill="rgba(255,255,255,0.2)"/>
</svg>